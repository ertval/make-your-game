<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Ms. Ghostman">
  <!-- #100: Ms. Ghostman favicon. Vector so it stays crisp at every tab size and
       sidesteps any raster decode/size-selection ambiguity. Declared first in
       index.html so SVG-capable browsers prefer it over the .ico/.png fallbacks. -->
  <!-- Ghost body: domed head + zig-zag skirt (classic arcade silhouette). -->
  <path fill="#ff3db4"
        d="M4 16 A12 12 0 0 1 28 16 L28 28 L25 25 L22 28 L19 25 L16 28 L13 25 L10 28 L7 25 L4 28 Z"/>
  <!-- Eyes. -->
  <circle cx="12" cy="15" r="3.6" fill="#ffffff"/>
  <circle cx="20" cy="15" r="3.6" fill="#ffffff"/>
  <circle cx="13.2" cy="15" r="1.7" fill="#1a1aff"/>
  <circle cx="21.2" cy="15" r="1.7" fill="#1a1aff"/>
  <!-- "Ms." bow on the crown. -->
  <path fill="#ffd23d" d="M16 4 L11 1.5 L11 6.5 Z M16 4 L21 1.5 L21 6.5 Z"/>
  <circle cx="16" cy="4" r="1.2" fill="#ffd23d"/>
</svg>
