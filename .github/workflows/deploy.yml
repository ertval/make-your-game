name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Pin npm version
        run: |
          set -euo pipefail
          npm install --global npm@11.6.1
          npm --version

      - name: Install dependencies
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run Biome Lint / Format Check
        run: |
          set -euo pipefail
          npm run check

      - name: Run Unit Tests
        run: |
          set -euo pipefail
          npm run test:unit

      - name: Build with Vite
        run: |
          set -euo pipefail
          npm run build

      - name: Copy dynamic runtime assets
        run: |
          set -euo pipefail
          cp -r assets/maps dist/assets/
          cp -r assets/manifests dist/assets/
          mkdir -p dist/assets/generated
          cp -r assets/generated/sfx dist/assets/generated/
          cp -r assets/generated/music dist/assets/generated/

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
