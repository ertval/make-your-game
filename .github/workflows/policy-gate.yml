name: Policy Gate

on:
  pull_request:
    branches:
      - "**"
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review
  pull_request_review:
    types:
      - submitted
      - edited
      - dismissed

permissions:
  contents: read
  pull-requests: read

jobs:
  policy-gate:
    name: Policy Gate
    runs-on: ubuntu-latest
    env:
      EVENT_PATH: ${{ github.event_path }}
      CI_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
      POLICY_HEADER_MODE: warn
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run all policy checks
        run: |
          set -euo pipefail
          npm run policy -- --require-approval=true
