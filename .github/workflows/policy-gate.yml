name: Policy Gate

on:
  pull_request:
    branches:
      - "**"
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review
  pull_request_review:
    types:
      - submitted
      - edited
      - dismissed

permissions:
  contents: read
  pull-requests: read

jobs:
  policy-gate:
    name: Policy Gate
    runs-on: ubuntu-latest
    env:
      EVENT_PATH: ${{ github.event_path }}
      BRANCH_NAME: ${{ github.event.pull_request.head.ref || github.head_ref || github.ref_name }}
      CI_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      POLICY_HEADER_MODE: fail
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Pin npm version
        run: |
          set -euo pipefail
          npm install --global npm@11.6.1
          npm --version

      - name: Install dependencies
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Playwright browsers
        run: |
          set -euo pipefail
          npx playwright install --with-deps chromium

      - name: Run Biome check
        run: |
          set -euo pipefail
          npm run check

      - name: Run unit and integration tests with coverage
        run: |
          set -euo pipefail
          npm run test:coverage

      - name: Run E2E tests
        run: |
          set -euo pipefail
          npm run test:e2e

      - name: Validate map JSON Schema
        run: |
          set -euo pipefail
          npm run validate:schema

      - name: Run Full-Repo Security Scan
        run: |
          set -euo pipefail
          node scripts/policy-gate/check-forbidden.mjs --scope=repo

      - name: Run Policy Gate (CI)
        run: |
          set -euo pipefail
          npm run policy -- --mode=ci --scope=all --require-approval=false

      - name: Regenerate SBOM
        run: |
          set -euo pipefail
          npm run sbom

      - name: Verify SBOM Is Up To Date
        run: |
          set -euo pipefail
          git diff --exit-code -- sbom.json
