<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ms. Ghostman - ECS Edition</title>
    <!-- #100: Ms. Ghostman favicon. Served from /public by Vite in both dev and
         build. SVG is declared first so modern browsers use the crisp vector;
         PNGs (largest-first) and the multi-size .ico are legacy fallbacks. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="stylesheet" href="/styles/base.css" />
  </head>
  <body>
    <main id="app" class="app-shell">
      <section id="hud" aria-label="Game HUD">
        <p class="hud__metric" data-hud="timer"><span class="hud__label">Timer:</span> <span class="hud__value" data-hud-value>0:00</span></p>
        <p class="hud__metric" data-hud="score"><span class="hud__label">Score:</span> <span class="hud__value" data-hud-value>00000</span></p>
        <p class="hud__metric" data-hud="lives"><span class="hud__label">Lives:</span> <span class="hud__value" data-hud-value>3</span></p>
        <p class="hud__metric" data-hud="bombs"><span class="hud__label">Bombs:</span> <span class="hud__value" data-hud-value>0</span></p>
        <p class="hud__metric" data-hud="fire"><span class="hud__label">Fire:</span> <span class="hud__value" data-hud-value>0</span></p>
        <p class="hud__metric" data-hud="level"><span class="hud__label">Level:</span> <span class="hud__value" data-hud-value>1</span></p>
        <div id="audio-quick-toggle" class="audio-quick-toggle" role="group" aria-label="Audio quick controls">
          <button
            type="button"
            class="audio-quick-toggle__button"
            data-audio-toggle="musicEnabled"
            data-icon-on="🎵"
            data-icon-off="🔇"
            aria-pressed="true"
            aria-label="Toggle music"
            title="Toggle music"
          >
            <span class="audio-quick-toggle__icon" data-audio-toggle-icon aria-hidden="true">🎵</span>
            <span class="audio-quick-toggle__text">Music</span>
          </button>
          <button
            type="button"
            class="audio-quick-toggle__button"
            data-audio-toggle="sfxEnabled"
            data-icon-on="🔊"
            data-icon-off="🔇"
            aria-pressed="true"
            aria-label="Toggle sound effects"
            title="Toggle sound effects"
          >
            <span class="audio-quick-toggle__icon" data-audio-toggle-icon aria-hidden="true">🔊</span>
            <span class="audio-quick-toggle__text">SFX</span>
          </button>
        </div>
        <p data-hud="status" aria-live="polite" aria-atomic="true"></p>
      </section>
      <section id="game-board" aria-label="Game Board" tabindex="-1"></section>
      <section id="overlay-root" class="overlay-container" role="dialog" aria-modal="true">
        <div id="overlay-error" aria-live="assertive" role="alert" class="is-screen-hidden"></div>
        <section data-screen="start" class="screen-overlay is-screen-hidden" aria-hidden="true" tabindex="-1">
          <div class="overlay__panel">
            <h1>Ms. Ghostman</h1>
            <div class="overlay__actions">
              <button type="button" data-option data-action="start-primary">Start Game</button>
              <button type="button" data-option data-action="open-settings" data-settings-origin="start">Settings</button>
              <button type="button" data-option data-action="start-secondary">High Scores</button>
            </div>
          </div>
        </section>
        <section data-screen="pause" class="screen-overlay is-screen-hidden" aria-hidden="true" tabindex="-1">
          <div class="overlay__panel">
            <h2>Paused</h2>
            <div class="overlay__actions">
              <button type="button" data-option data-action="pause-continue">Continue</button>
              <button type="button" data-option data-action="open-settings" data-settings-origin="pause">Settings</button>
              <button type="button" data-option data-action="pause-restart">Restart</button>
            </div>
          </div>
        </section>
        <section data-screen="settings" class="screen-overlay is-screen-hidden" aria-hidden="true" tabindex="-1">
          <div class="overlay__panel" role="group" aria-label="Audio settings">
            <h2>Settings</h2>
            <div class="overlay__actions overlay__actions--settings">
              <button
                type="button"
                data-option
                data-action="settings-toggle-music"
                data-setting="musicEnabled"
                aria-pressed="true"
              >
                <span class="settings__icon" data-setting-icon aria-hidden="true">🔊</span>
                <span class="settings__text">Music</span>
              </button>
              <div class="settings__slider-row">
                <label class="settings__slider-label" for="settings-music-volume">Music Volume</label>
                <input
                  type="range"
                  id="settings-music-volume"
                  data-option
                  data-action="settings-volume-music"
                  data-setting="musicVolume"
                  min="0"
                  max="100"
                  step="1"
                  value="100"
                  aria-valuemin="0"
                  aria-valuemax="100"
                  aria-valuenow="100"
                />
              </div>
              <button
                type="button"
                data-option
                data-action="settings-toggle-sfx"
                data-setting="sfxEnabled"
                aria-pressed="true"
              >
                <span class="settings__icon" data-setting-icon aria-hidden="true">🔊</span>
                <span class="settings__text">SFX</span>
              </button>
              <div class="settings__slider-row">
                <label class="settings__slider-label" for="settings-sfx-volume">SFX &amp; UI Volume</label>
                <input
                  type="range"
                  id="settings-sfx-volume"
                  data-option
                  data-action="settings-volume-sfx"
                  data-setting="sfxVolume"
                  min="0"
                  max="100"
                  step="1"
                  value="100"
                  aria-valuemin="0"
                  aria-valuemax="100"
                  aria-valuenow="100"
                />
              </div>
              <button type="button" data-option data-action="settings-back">Back</button>
            </div>
          </div>
        </section>
        <section data-screen="level-complete" class="screen-overlay is-screen-hidden" aria-hidden="true" tabindex="-1">
          <div class="overlay__panel">
            <h2>Level Complete</h2>
            <div class="overlay__actions">
              <button type="button" data-option data-action="level-next">Next Level</button>
            </div>
          </div>
        </section>
        <section data-screen="game-over" class="screen-overlay is-screen-hidden" aria-hidden="true" tabindex="-1">
          <div class="overlay__panel">
            <h2>Game Over</h2>
            <p data-high-score></p>
            <div class="overlay__actions">
              <button type="button" data-option data-action="gameover-play-again">Play Again</button>
            </div>
          </div>
        </section>
        <section data-screen="victory" class="screen-overlay is-screen-hidden" aria-hidden="true" tabindex="-1">
          <div class="overlay__panel">
            <h2>Victory!</h2>
            <p data-high-score></p>
            <div class="overlay__actions">
              <button type="button" data-option data-action="victory-play-again">Play Again</button>
            </div>
          </div>
        </section>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
