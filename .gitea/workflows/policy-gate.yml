name: Policy Gate

on:
  pull_request:
    branches:
      - "**"
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

jobs:
  policy-gate:
    name: Policy Gate
    runs-on: ubuntu-latest
    env:
      EVENT_PATH: ${{ github.event_path }}
      EVENT_NAME: ${{ github.event_name }}
      CI_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run policy gate scripts
        run: |
          set -euo pipefail
          npm run policy:ci
