name: Policy Gate

on:
  pull_request:
    branches:
      - "**"
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

jobs:
  policy-gate:
    name: Policy Gate
    runs-on: ubuntu-latest
    env:
      EVENT_PATH: ${{ github.event_path }}
      EVENT_NAME: ${{ github.event_name }}
      CI_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITEA_TOKEN: ${{ secrets.RUNNER_TOKEN  }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse pull request payload
        run: |
          set -euo pipefail

          EVENT_PATH="${EVENT_PATH:-${GITHUB_EVENT_PATH:-}}"
          if [ -z "$EVENT_PATH" ] || [ ! -f "$EVENT_PATH" ]; then
            echo "Missing event payload file: ${EVENT_PATH:-unset}" >&2
            exit 1
          fi

          node --input-type=module <<'NODE'
          import fs from 'node:fs';

          const eventPath = process.env.EVENT_PATH ?? process.env.GITHUB_EVENT_PATH;
          const event = JSON.parse(fs.readFileSync(eventPath, 'utf8'));
          const pr = event.pull_request;

          if (!pr) {
            throw new Error('This workflow requires a pull_request payload.');
          }

          const metadata = {
            number: pr.number,
            body: pr.body ?? '',
            author: pr.user?.login ?? '',
            baseSha: pr.base?.sha ?? '',
            headSha: pr.head?.sha ?? '',
            reviewsUrl: pr.url ? `${pr.url}/reviews` : (pr.reviews_url ?? ''),
          };

          fs.writeFileSync('.policy-pr-meta.json', `${JSON.stringify(metadata, null, 2)}\n`, 'utf8');
          NODE

      - name: Collect changed files
        run: |
          set -euo pipefail

          BASE_SHA="$(node --input-type=module -e "import fs from 'node:fs'; const meta = JSON.parse(fs.readFileSync('.policy-pr-meta.json', 'utf8')); process.stdout.write(meta.baseSha || '')")"
          HEAD_SHA="$(node --input-type=module -e "import fs from 'node:fs'; const meta = JSON.parse(fs.readFileSync('.policy-pr-meta.json', 'utf8')); process.stdout.write(meta.headSha || '')")"

          if [ -n "$BASE_SHA" ] && [ -n "$HEAD_SHA" ]; then
            git diff --name-only "$BASE_SHA" "$HEAD_SHA" | sort -u > changed-files.txt
          elif git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            echo "PR SHAs unavailable, falling back to HEAD~1...HEAD diff."
            git diff --name-only HEAD~1 HEAD | sort -u > changed-files.txt
          else
            echo "No previous commit available, using tracked files as fallback."
            git ls-files | sort -u > changed-files.txt
          fi

          echo "Changed files:"
          cat changed-files.txt

      - name: Require PR checklist sections
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import fs from 'node:fs';

          const meta = JSON.parse(fs.readFileSync('.policy-pr-meta.json', 'utf8'));
          const body = String(meta.body ?? '');

          const requiredSections = [
            'What changed',
            'Why',
            'Tests',
            'Audit questions affected',
            'Security notes',
            'Architecture / dependency notes',
            'Risks',
          ];

          const missingSections = requiredSections.filter((section) => {
            const pattern = new RegExp(String.raw`^##\s+${section.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}`, 'im');
            return !pattern.test(body);
          });

          if (missingSections.length) {
            throw new Error(`Missing required PR sections: ${missingSections.join(', ')}`);
          }

          const requiredCheckboxes = [
            'I read AGENTS.md and the agentic workflow guide',
            'I ran the applicable local checks',
            'I listed the audit IDs affected by this change',
            'I checked security sinks and trust boundaries',
            'I checked architecture boundaries',
            'I checked dependency and lockfile impact',
            'I requested human review',
          ];

          const missingChecks = requiredCheckboxes.filter((label) => {
            const escaped = label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const pattern = new RegExp(String.raw`^\s*- \[[xX]\]\s+${escaped}\s*$`, 'im');
            return !pattern.test(body);
          });

          if (missingChecks.length) {
            throw new Error(`Missing required PR checklist items: ${missingChecks.join(', ')}`);
          }
          NODE

      - name: Require independent approval when review API is available
        run: |
          set -euo pipefail

          REVIEWS_URL="$(node --input-type=module -e "import fs from 'node:fs'; const meta = JSON.parse(fs.readFileSync('.policy-pr-meta.json', 'utf8')); process.stdout.write(meta.reviewsUrl || '')")"
          AUTHOR="$(node --input-type=module -e "import fs from 'node:fs'; const meta = JSON.parse(fs.readFileSync('.policy-pr-meta.json', 'utf8')); process.stdout.write(meta.author || '')")"
          TOKEN="${CI_TOKEN:-${GITHUB_TOKEN:-${GITEA_TOKEN:-}}}"

          if [ -z "$REVIEWS_URL" ]; then
            echo "No review endpoint found in event payload; skipping approval API check."
            exit 0
          fi

          if [ -z "$TOKEN" ]; then
            echo "No CI token available; skipping approval API check."
            echo "Configure branch protection to require approvals at the server level."
            exit 0
          fi

          HTTP_CODE="$(
            curl -sS -L \
              -H "Accept: application/json" \
              -H "Authorization: token $TOKEN" \
              -o reviews.json \
              -w "%{http_code}" \
              "$REVIEWS_URL"
          )"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Review API check skipped (HTTP $HTTP_CODE)."
            echo "Configure branch protection to require approvals at the server level."
            exit 0
          fi

          AUTHOR="$AUTHOR" node --input-type=module <<'NODE'
          import fs from 'node:fs';

          const author = process.env.AUTHOR ?? '';
          const payload = fs.readFileSync('reviews.json', 'utf8').trim();

          if (!payload) {
            console.log('Review API returned an empty response; skipping approval check.');
            process.exit(0);
          }

          const reviews = JSON.parse(payload);
          if (!Array.isArray(reviews)) {
            console.log('Review API did not return a review array; skipping approval check.');
            process.exit(0);
          }

          const approvals = reviews.filter((review) => {
            return String(review.state ?? '').toUpperCase() === 'APPROVED'
              && review.user?.login
              && review.user.login !== author;
          });

          if (approvals.length === 0) {
            throw new Error('At least one independent approval is required before merge.');
          }
          NODE

      - name: Enforce audit traceability and dependency pairing
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import fs from 'node:fs';

          const changedFiles = fs.readFileSync('changed-files.txt', 'utf8')
            .split(/\r?\n/)
            .map((line) => line.trim())
            .filter(Boolean);
          const changed = new Set(changedFiles);
          const touches = (prefix) => changedFiles.some((file) => file.startsWith(prefix));
          const has = (file) => changed.has(file);

          const packageJsonChanged = has('package.json');
          const packageLockChanged = has('package-lock.json');
          if (packageJsonChanged !== packageLockChanged) {
            throw new Error('package.json and package-lock.json must change together.');
          }

          const touchesAuditDocs = has('docs/audit.md');
          const touchesRequirements = has('docs/requirements.md');
          const touchesGameDescription = has('docs/game-description.md');
          const touchesTraceability = has('docs/implementation/audit-traceability-matrix.md');
          const touchesAuditTests = touches('tests/e2e/audit/');

          if (touchesAuditDocs || touchesRequirements || touchesGameDescription || touchesAuditTests) {
            const required = [];
            if (!touchesTraceability) required.push('docs/implementation/audit-traceability-matrix.md');
            if (!touchesAuditTests) required.push('tests/e2e/audit/');
            if ((touchesAuditDocs || touchesRequirements || touchesGameDescription) && !has('docs/audit.md')) {
              required.push('docs/audit.md');
            }
            if (required.length) {
              throw new Error(`Audit-related changes must update the following paths in the same PR: ${required.join(', ')}`);
            }
          }

          const auditCount = (fs.readFileSync('docs/audit.md', 'utf8').match(/^######\s+/gm) || []).length;
          const auditIds = (fs.readFileSync('tests/e2e/audit/audit-question-map.js', 'utf8').match(/id:\s*'AUDIT-[A-Z]-\d{2}'/g) || []).length;
          const uniqueAuditIds = new Set((fs.readFileSync('tests/e2e/audit/audit-question-map.js', 'utf8').match(/id:\s*'AUDIT-[A-Z]-\d{2}'/g) || [])).size;

          if (auditCount !== auditIds || auditIds !== uniqueAuditIds) {
            throw new Error(`Audit inventory mismatch: docs/audit.md has ${auditCount} questions, audit map has ${auditIds} IDs, unique IDs ${uniqueAuditIds}.`);
          }
          NODE

      - name: Scan security and architecture boundaries
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import fs from 'node:fs';

          const changedFiles = fs.readFileSync('changed-files.txt', 'utf8')
            .split(/\r?\n/)
            .map((line) => line.trim())
            .filter(Boolean);

          const sourcePattern = /\.(js|mjs|cjs|ts|tsx|jsx|html)$/;
          const unsafeSinks = [
            /\binnerHTML\b/,
            /\bouterHTML\b/,
            /\binsertAdjacentHTML\b/,
            /\bdocument\.write\b/,
            /\beval\s*\(/,
            /\bnew\s+Function\s*\(/,
            /\brequire\s*\(/,
            /\bvar\b/,
            /\bXMLHttpRequest\b/,
            /setTimeout\s*\(\s*['"]/,
            /setInterval\s*\(\s*['"]/,
          ];
          const frameworkImports = [
            /from\s+['"](?:react|vue|angular|svelte|phaser|pixi\.js|three|jquery|canvas)['"]/,
            /require\s*\(\s*['"](?:react|vue|angular|svelte|phaser|pixi\.js|three|jquery|canvas)['"]\s*\)/,
          ];
          const domAPIs = [
            /\bdocument\./,
            /\bwindow\./,
            /\bquerySelector(All)?\b/,
            /\bcreateElement(NS)?\b/,
            /\bappendChild\b/,
            /\binsertBefore\b/,
            /\baddEventListener\b/,
            /\binnerHTML\b/,
            /\bouterHTML\b/,
            /\binsertAdjacentHTML\b/,
          ];

          for (const file of changedFiles) {
            if (!sourcePattern.test(file) || !fs.existsSync(file)) {
              continue;
            }

            const content = fs.readFileSync(file, 'utf8');
            const isSystemFile = file.startsWith('src/ecs/systems/');
            const isRenderAdapter = file === 'src/ecs/systems/render-dom-system.js';

            for (const pattern of unsafeSinks) {
              if (pattern.test(content)) {
                throw new Error(`Unsafe sink or forbidden API found in ${file}: ${pattern}`);
              }
            }

            for (const pattern of frameworkImports) {
              if (pattern.test(content)) {
                throw new Error(`Framework or CommonJS import found in ${file}: ${pattern}`);
              }
            }

            if (isSystemFile && !isRenderAdapter) {
              for (const pattern of domAPIs) {
                if (pattern.test(content)) {
                  throw new Error(`DOM boundary violation in ECS system file ${file}: ${pattern}`);
                }
              }
            }
          }
          NODE

      - name: Run local project gate when available
        run: |
          set -euo pipefail
          if [ -f package.json ]; then
            npm run check
            npm run test
            node --input-type=module <<'NODE'
            import fs from 'node:fs';

            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const scripts = pkg.scripts ?? {};
            const extraScripts = [];

            if (scripts['test:coverage']) {
              extraScripts.push('test:coverage');
            } else if (scripts['coverage']) {
              extraScripts.push('coverage');
            }

            if (scripts['sbom']) {
              extraScripts.push('sbom');
            }

            fs.writeFileSync('.policy-extra-scripts', `${extraScripts.join('\n')}\n`, 'utf8');
            NODE

            while IFS= read -r script; do
              [ -z "$script" ] && continue
              npm run "$script"
            done < .policy-extra-scripts

            rm -f .policy-extra-scripts
          else
            echo "package.json not present; skipping npm gate."
          fi
