<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!--
    Clyde Ghost (Orange)
    Fickle ghost - chases then retreats when close to player
    Features: Orange body, goofy/clueless expression, droopy eyes
  -->
  <defs>
    <linearGradient id="clydeBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffb852"/>
      <stop offset="100%" stop-color="#e09030"/>
    </linearGradient>
  </defs>
  <!-- Ghost body with wavy bottom -->
  <path d="M16 2 C8 2 2 8 2 16 L2 28 L6 26 L10 28 L14 26 L18 28 L22 26 L26 28 L30 26 L30 16 C30 8 24 2 16 2 Z" fill="url(#clydeBody)"/>
  <!-- Left eye (droopy, half-closed) -->
  <ellipse cx="11" cy="15" rx="3.5" ry="4.5" fill="#ffffff"/>
  <path d="M7.5 15 A3.5 4.5 0 0 0 14.5 15 Z" fill="#ffffff"/>
  <circle cx="11" cy="16" r="2" fill="#000033"/>
  <circle cx="11.5" cy="15.5" r="0.8" fill="#ffffff"/>
  <!-- Right eye (droopy, half-closed) -->
  <ellipse cx="21" cy="15" rx="3.5" ry="4.5" fill="#ffffff"/>
  <path d="M17.5 15 A3.5 4.5 0 0 0 24.5 15 Z" fill="#ffffff"/>
  <circle cx="21" cy="16" r="2" fill="#000033"/>
  <circle cx="21.5" cy="15.5" r="0.8" fill="#ffffff"/>
  <!-- Droopy eyebrows (raised above eyes) -->
  <path d="M8 9 Q10.5 10.5 14 9" fill="none" stroke="#000033" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M18 9 Q21.5 10.5 24 9" fill="none" stroke="#000033" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Goofy open mouth (small, lower position) -->
  <ellipse cx="16" cy="23" rx="3" ry="2" fill="#000033"/>
</svg>
