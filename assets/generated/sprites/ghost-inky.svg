<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!--
    Inky Ghost (Cyan)
    Unpredictable ghost - uses Blinky's position in targeting
    Features: Cyan body, skeptical/worried expression, asymmetrical eyes
  -->
  <defs>
    <linearGradient id="inkyBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="100%" stop-color="#00cccc"/>
    </linearGradient>
  </defs>
  <!-- Ghost body with wavy bottom -->
  <path d="M16 2 C8 2 2 8 2 16 L2 28 L6 26 L10 28 L14 26 L18 28 L22 26 L26 28 L30 26 L30 16 C30 8 24 2 16 2 Z" fill="url(#inkyBody)"/>
  <!-- Left eye (slightly larger, worried look) -->
  <ellipse cx="10" cy="14" rx="4" ry="4.5" fill="#ffffff"/>
  <circle cx="11.5" cy="15.5" r="2" fill="#000033"/>
  <circle cx="12" cy="15" r="0.8" fill="#ffffff"/>
  <!-- Right eye (offset pupil for confused look) -->
  <ellipse cx="22" cy="14" rx="3" ry="4.5" fill="#ffffff"/>
  <circle cx="21" cy="15.5" r="2" fill="#000033"/>
  <circle cx="21.5" cy="15" r="0.8" fill="#ffffff"/>
  <!-- Worried/uncertain eyebrows -->
  <path d="M7 11 Q10 9 14 10" fill="none" stroke="#000033" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M18 10 Q22 9 25 11" fill="none" stroke="#000033" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Wavy mouth (uncertain expression) -->
  <path d="M13 20 Q16 18 19 20" fill="none" stroke="#000033" stroke-width="1.2" stroke-linecap="round"/>
</svg>
